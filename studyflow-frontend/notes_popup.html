<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notes – StudyFlow</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.1.1/css/all.min.css">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        i.fas, i.far { font-family: "Font Awesome 6 Free" !important; font-weight: 900 !important; }
        i.fab { font-family: "Font Awesome 6 Brands" !important; font-weight: 400 !important; }

        :root {
            --accent: #7C3AED;
            --accent-light: #EDE9FE;
            --accent-dark: #5B21B6;
            --success: #059669;
            --error: #DC2626;
            --text: #1E1B4B;
            --text-secondary: #6B7280;
            --border: #E5E7EB;
            --bg: #F5F4FB;
            --font: 'Plus Jakarta Sans', sans-serif;
        }

        body {
            font-family: var(--font);
            background: white;
            color: var(--text);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            user-select: none;
        }

        .drag-bar {
            padding: 8px 14px;
            background: var(--accent);
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: grab;
            flex-shrink: 0;
        }
        .drag-bar:active { cursor: grabbing; }

        .drag-logo {
            width: 24px;
            height: 24px;
            border-radius: 6px;
            background: rgba(255,255,255,0.25);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 0.7rem;
            flex-shrink: 0;
        }

        .popup-name-input {
            flex: 1;
            font-family: var(--font);
            font-size: 0.88rem;
            font-weight: 700;
            color: white;
            background: transparent;
            border: none;
            outline: none;
            min-width: 60px;
        }
        .popup-name-input::placeholder { color: rgba(255,255,255,0.6); }

        .save-indicator {
            font-size: 0.7rem;
            color: rgba(255,255,255,0.8);
            display: flex;
            align-items: center;
            gap: 4px;
            flex-shrink: 0;

            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: #86EFAC;
            transition: background 0.3s;

        .close-btn {
            background: none;
            border: none;
            color: rgba(255,255,255,0.7);
            font-size: 1.1rem;
            cursor: pointer;
            padding: 0 4px;
            transition: color 0.2s;
        }
        .close-btn:hover { color: white; }

        .popup-toolbar {
            padding: 6px 12px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 4px;
            background: #FAFAFA;
            flex-shrink: 0;
            flex-wrap: wrap;
        }

        .tool-btn {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 4px 10px;
            border-radius: 6px;
            font-family: var(--font);
            font-size: 0.72rem;
            font-weight: 600;
            cursor: pointer;
            border: 1px solid var(--border);
            background: white;
            color: var(--text);
            transition: all 0.15s;
        }
        .tool-btn:hover { border-color: var(--accent); color: var(--accent); }

        .tool-btn.record {
            border-color: transparent;

            color: var(--error);
        }
        .tool-btn.record:hover { background: #FECACA; }

        .tool-btn.recording {
            background: var(--error);
            color: white;
            animation: pulse 1s infinite;
        }

        .tool-btn .shortcut {
            font-size: 0.6rem;
            opacity: 0.5;
            margin-left: 2px;
        }

        @keyframes pulse {
            0%,100%{opacity:1} 50%{opacity:0.6}
        }

        .word-count {
            margin-left: auto;
            font-size: 0.7rem;
            color: var(--text-secondary);
            font-weight: 500;
            white-space: nowrap;
        }

        .popup-body {
            flex: 1;
            overflow-y: auto;
            padding: 12px 14px;
            min-height: 100px;
        }

        .popup-textarea {
            width: 100%;
            height: 100%;
            min-height: 120px;
            font-family: var(--font);
            font-size: 0.88rem;
            color: var(--text);
            line-height: 1.75;
            border: none;
            outline: none;
            resize: none;
            background: transparent;
        }
        .popup-textarea::placeholder { color: #C4B5FD; }

        .resize-handle {
            height: 8px;
            background: transparent;
            cursor: ns-resize;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #9CA3AF;
            font-size: 0.6rem;
            transition: background 0.2s;
            border-top: 1px solid var(--border);
        }
        .resize-handle:hover { background: var(--accent-light); }

        .transcript-banner {
            padding: 6px 12px;
            background: #EDE9FE;
            border-top: 1px solid #DDD6FE;
            font-size: 0.75rem;
            color: var(--accent);
            font-weight: 600;
            display: none;
            align-items: center;
            gap: 6px;
            flex-shrink: 0;
        }
        .transcript-banner.visible { display: flex; }

        .interim-text {
            color: #9CA3AF;
            font-style: italic;
            font-weight: 400;
        }

        .popup-footer {
            padding: 6px 12px;
            border-top: 1px solid var(--border);
            background: #FAFAFA;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
            gap: 8px;
            flex-wrap: wrap;
        }

        .footer-tip {
            font-size: 0.65rem;
            color: var(--text-secondary);
        }

        .footer-shortcuts {
            font-size: 0.65rem;
            color: var(--text-secondary);
        }

        .footer-shortcuts kbd {
            background: var(--bg);
            padding: 1px 6px;
            border-radius: 3px;
            font-size: 0.6rem;
            font-weight: 700;
            border: 1px solid var(--border);
        }

        .btn-save-popup {
            padding: 4px 14px;
            border-radius: 6px;
            background: var(--accent);
            color: white;
            border: none;
            font-family: var(--font);
            font-size: 0.72rem;
            font-weight: 700;
            cursor: pointer;
            transition: background 0.2s;
        }
        .btn-save-popup:hover { background: var(--accent-dark); }

        @media (max-width: 480px) {
            .popup-toolbar { flex-wrap: wrap; }
            .word-count { margin-left: 0; width: 100%; text-align: right; }
            .tool-btn { font-size: 0.65rem; padding: 3px 8px; }
        }
    </style>
</head>
<body>

    <div class="drag-bar" id="drag-bar">
        <div class="drag-logo"><i class="fas fa-graduation-cap"></i></div>
        <input type="text" class="popup-name-input" id="popup-name" placeholder="Project name..." />
        <div class="save-indicator">
            <div class="save-dot" id="save-dot"></div>
            <span id="save-status">Saved</span>
        </div>
        <button class="close-btn" onclick="closePopup()" title="Close (Ctrl+W)"><i class="fas fa-times"></i></button>
    </div>

    <div class="popup-toolbar">
        <button class="tool-btn record" id="record-btn" onclick="toggleRecording()">
            <i class="fas fa-microphone"></i> Record <span class="shortcut">(Ctrl+Shift+R)</span>
        </button>
        <button class="tool-btn" onclick="clearContent()">
            <i class="fas fa-eraser"></i> Clear
        </button>
        <button class="tool-btn" onclick="copyAll()">
            <i class="fas fa-copy"></i> Copy All <span class="shortcut">(Ctrl+C)</span>
        </button>
        <span class="word-count" id="word-count">0 words</span>
    </div>

    <div class="transcript-banner" id="transcript-banner">
        <i class="fas fa-circle" style="color:#DC2626;font-size:0.5rem;"></i>
        Recording... <span class="interim-text" id="interim-text"></span>
    </div>

    <div class="popup-body">
        <textarea class="popup-textarea" id="popup-textarea"
            placeholder="Take notes here while you study...&#10;&#10;• Click Record to transcribe your voice (Chrome only)&#10;• Content auto-saves every 10 seconds&#10;• Resize this window as needed"></textarea>
    </div>

    <div class="resize-handle" id="resize-handle">
        <i class="fas fa-grip-lines"></i>
    </div>

    <div class="popup-footer">
        <span class="footer-tip">💡 Auto-saves every 10s</span>
        <span class="footer-shortcuts">
            <kbd>Ctrl+S</kbd> Save · <kbd>Ctrl+Shift+R</kbd> Record · <kbd>Ctrl+W</kbd> Close
        </span>
        <button class="btn-save-popup" onclick="saveNote()">Save Now</button>
    </div>

    <script>
        // ──────────────────────────────────────────────────────────────
        // 📌 NOTES POPUP — StudyFlow
        // ──────────────────────────────────────────────────────────────

        const API = 'http://127.0.0.1:8000';
        const token = localStorage.getItem('studyflowToken');
        const params = new URLSearchParams(window.location.search);
        let noteId = params.get('id') || null;
        const noteName = params.get('name') || 'Untitled';

        // ── Position Memory ──
        const POSITION_KEY = 'studyflow_note_position';
        // ── Local Storage Functions ──

        function getNotesFromLocal() {
            try {
                const data = localStorage.getItem('studyflow_notes');
                return data ? JSON.parse(data) : [];
            } catch (e) {
                return [];
            }
        }

        function saveNotesToLocal(notes) {
            localStorage.setItem('studyflow_notes', JSON.stringify(notes));
        }

        function loadPosition() {
            try {
                const pos = JSON.parse(localStorage.getItem(POSITION_KEY));
                if (pos) {
                    window.moveTo(pos.x, pos.y);
                    if (pos.width && pos.height) {
                        window.resizeTo(pos.width, pos.height);
                    }
                }
            } catch (e) { /* ignore */ }
        }

        function savePosition() {
            try {
                localStorage.setItem(POSITION_KEY, JSON.stringify({
                    x: window.screenX,
                    y: window.screenY,
                    width: window.innerWidth,
                    height: window.innerHeight
                }));
            } catch (e) { /* ignore */ }
        }

        window.addEventListener('resize', savePosition);
        window.addEventListener('move', savePosition);

        document.getElementById('popup-name').value = noteName;

        let recognition = null;
        let isRecording = false;
        let finalTranscript = '';
        let autoSaveTimer = null;

        // ── Toast for popup ──
        function showToast(message, type = 'info') {
            const status = document.getElementById('save-status');
            const original = status.textContent;
            status.textContent = message;
            status.style.color = type === 'error' ? '#DC2626' : '#86EFAC';
            setTimeout(() => {
                status.textContent = original;
                status.style.color = '';
            }, 2000);
        }

        // ── Load existing note ──
        function loadNote() {
            if (!noteId) return;
            const notes = getNotesFromLocal();
            const note = notes.find(n => n.id == noteId);
            if (note) {
                document.getElementById('popup-textarea').value = note.content || '';
                document.getElementById('popup-name').value = note.title || noteName;
                finalTranscript = note.content || '';
                updateWordCount();
            }
        }

        // ── Save Note ──
        function saveNote() {
            const title = document.getElementById('popup-name').value.trim() || 'Untitled';
            const content = document.getElementById('popup-textarea').value;
            
            let notes = getNotesFromLocal();
            
            if (noteId) {
                const index = notes.findIndex(n => n.id == noteId);
                if (index !== -1) {
                    notes[index] = { ...notes[index], title, content, updated_at: new Date().toISOString() };
                }
            } else {
                // New note (should not happen in popup, but just in case)
                const newNote = {
                    id: Date.now(),
                    title,
                    content,
                    color: '#FAFAFE',
                    tags: [],
                    is_pinned: false,
                    created_at: new Date().toISOString(),
                    updated_at: new Date().toISOString()
                };
                notes.push(newNote);
                noteId = newNote.id;
            }
            
            saveNotesToLocal(notes);
            setSaveStatus('saved');
        }

        function setSaveStatus(s) {
            const dot = document.getElementById('save-dot');
            const label = document.getElementById('save-status');
            dot.classList.toggle('saving', s === 'saving');
            label.textContent = s === 'saving' ? 'Saving...' : 'Saved';
        }

        function updateWordCount() {
            const text = document.getElementById('popup-textarea').value;
            const w = text.trim() ? text.trim().split(/\s+/).length : 0;
            document.getElementById('word-count').textContent = `${w} word${w !== 1 ? 's' : ''}`;
        }

        document.getElementById('popup-textarea').addEventListener('input', updateWordCount);

        autoSaveTimer = setInterval(() => saveNote(), 10000);

        // ── Keyboard Shortcuts ──
        document.addEventListener('keydown', (e) => {
            if (e.ctrlKey && e.key === 's') {
                e.preventDefault();
                saveNote();
                showToast('Saved! ✅', 'success');
                return;
            }
            if (e.ctrlKey && e.shiftKey && e.key === 'R') {
                e.preventDefault();
                toggleRecording();
                return;
            }
            if (e.ctrlKey && e.key === 'w') {
                e.preventDefault();
                closePopup();
                return;
            }
        });

        function closePopup() {
            saveNote();
            savePosition();
            window.close();
        }

        // ── Recording (FIXED) ──
        function toggleRecording() {
            if (isRecording) {
                stopRecording();
            } else {
                startRecording();
            }
        }

        function startRecording() {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            
            if (!SpeechRecognition) {
                showToast('❌ Requires Chrome', 'error');
                return;
            }

            navigator.mediaDevices.getUserMedia({ audio: true })
                .then(() => {
                    recognition = new SpeechRecognition();
                    recognition.continuous = true;
                    recognition.interimResults = true;
                    recognition.lang = 'en-US';

                    const textarea = document.getElementById('popup-textarea');
                    let finalText = textarea.value || '';

                    recognition.onstart = function() {
                        isRecording = true;
                        const btn = document.getElementById('record-btn');
                        btn.classList.add('recording');
                        btn.innerHTML = '<i class="fas fa-stop"></i> Stop';
                        document.getElementById('transcript-banner').classList.add('visible');
                        showToast('🎤 Recording...', 'success');
                    };

                    recognition.onresult = function(event) {
                        let interim = '';
                        for (let i = event.resultIndex; i < event.results.length; i++) {
                            if (event.results[i].isFinal) {
                                finalText += event.results[i][0].transcript + ' ';
                            } else {
                                interim = event.results[i][0].transcript;
                            }
                        }
                        textarea.value = finalText + interim;
                        document.getElementById('interim-text').textContent = interim;
                        updateWordCount();
                        const body = document.querySelector('.popup-body');
                        body.scrollTop = body.scrollHeight;
                        
                        if (event.results[event.results.length - 1].isFinal) {
                            finalText = textarea.value;
                        }
                    };

                    recognition.onerror = function(event) {
                        console.warn('Recognition error:', event.error);
                        if (event.error === 'not-allowed') {
                            showToast('❌ Microphone denied', 'error');
                        } else if (event.error === 'no-speech') {
                            showToast('🔇 No speech detected', 'info');
                        }
                        stopRecording();
                    };

                    recognition.onend = function() {
                        if (isRecording) {
                            try { recognition.start(); } catch (e) {}
                        }
                    };

                    recognition.start();
                })
                .catch(function() {
                    showToast('❌ Microphone access denied', 'error');
                });
        }

        function stopRecording() {
            isRecording = false;
            if (recognition) {
                try { recognition.stop(); } catch (e) {}
                recognition = null;
            }
            const btn = document.getElementById('record-btn');
            if (btn) {
                btn.classList.remove('recording');
                btn.innerHTML = '<i class="fas fa-microphone"></i> Record';
            }
            document.getElementById('transcript-banner').classList.remove('visible');
            document.getElementById('interim-text').textContent = '';
            showToast('⏹️ Stopped', 'info');
            saveNote();
        }

        function clearContent() {
            if (confirm('Clear all content?')) {
                document.getElementById('popup-textarea').value = '';
                finalTranscript = '';
                updateWordCount();
                saveNote();
            }
        }

        function copyAll() {
            const text = document.getElementById('popup-textarea').value;
            navigator.clipboard.writeText(text).then(() => {
                showToast('📋 Copied!', 'success');
            });
        }

        // ── Resize Handle ──
        const resizeHandle = document.getElementById('resize-handle');
        let isResizing = false;
        let startY, startHeight;

        resizeHandle.addEventListener('mousedown', (e) => {
            isResizing = true;
            startY = e.clientY;
            startHeight = window.innerHeight;
            document.body.style.cursor = 'ns-resize';
            document.body.style.userSelect = 'none';
            e.preventDefault();
        });

        document.addEventListener('mousemove', (e) => {
            if (!isResizing) return;
            const delta = e.clientY - startY;
            const newHeight = Math.max(200, startHeight + delta);
            window.resizeTo(window.innerWidth, newHeight);
            savePosition();
        });

        document.addEventListener('mouseup', () => {
            if (isResizing) {
                isResizing = false;
                document.body.style.cursor = '';
                document.body.style.userSelect = '';
                savePosition();
            }
        });

        // ── Drag Bar ──
        const dragBar = document.getElementById('drag-bar');
        let isDragging = false;
        let dragStartX, dragStartY, winStartX, winStartY;

        dragBar.addEventListener('mousedown', (e) => {
            if (e.target.tagName === 'INPUT') return;
            isDragging = true;
            dragStartX = e.clientX;
            dragStartY = e.clientY;
            winStartX = window.screenX;
            winStartY = window.screenY;
            document.body.style.cursor = 'grabbing';
            e.preventDefault();
        });

        document.addEventListener('mousemove', (e) => {
            if (!isDragging) return;
            const dx = e.clientX - dragStartX;
            const dy = e.clientY - dragStartY;
            window.moveTo(winStartX + dx, winStartY + dy);
        });

        document.addEventListener('mouseup', () => {
            if (isDragging) {
                isDragging = false;
                document.body.style.cursor = '';
                savePosition();
            }
        });

        window.addEventListener('beforeunload', () => {
            saveNote();
            savePosition();
        });

        loadPosition();
        loadNote();

        setTimeout(() => {
            document.getElementById('popup-textarea').focus();
        }, 300);

        console.log('📌 Notes Popup loaded. API:', API);
        console.log('🔑 Token:', token ? '✅' : '❌');
    </script>
</body>
</html>
