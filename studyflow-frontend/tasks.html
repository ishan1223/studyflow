<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Scheduler – StudyFlow</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.1.1/css/all.min.css">
    <link rel="apple-touch-icon" sizes="180x180" href="./favicon_io/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon_io/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon_io/favicon-16x16.png">
    <link rel="manifest" href="/favicon_io/site.webmanifest">
    <link rel="shortcut icon" href="/favicon_io/favicon.ico">
    <meta name="theme-color" content="#ffffff">
    <style>
        /* ──────────────────────────────────────────────────────────────
           📌 NOTE: This page uses REAL API calls from the StudyFlow backend.
           If tables (todos) don't exist yet, the page gracefully shows 
           empty states with encouraging messages.
           
           To enable full functionality, run:
           docker-compose exec db psql -U user -d studyflow -f /app/schema_v2_features.sql
           ────────────────────────────────────────────────────────────── */

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        i.fas, i.far, i.fa { font-family: "Font Awesome 6 Free" !important; font-weight: 900 !important; }
        i.fab { font-family: "Font Awesome 6 Brands" !important; font-weight: 400 !important; }

        :root {
            --accent-glow: #7C3AED;
            --success-color: #059669;
            --error-color: #DC2626;
            --bg-dark: #F5F4FB;
            --bg-card: #FFFFFF;
            --border-color: #E5E7EB;
            --text-primary: #1E1B4B;
            --text-secondary: #6B7280;
            --text-placeholder: #9CA3AF;
            --spacing-sm: 8px;
            --spacing-md: 12px;
            --spacing-lg: 16px;
            --spacing-xl: 32px;
            --spacing-2xl: 48px;
            --border-radius-md: 8px;
            --border-radius-lg: 16px;
            --border-radius-pill: 20px;
            --transition-fast: 0.15s;
            --transition-normal: 0.2s;
            --font-size-sm: 0.88rem;
            --font-size-base: 1rem;
            --font-size-lg: 1.1rem;
            --font-size-xl: 1.35rem;
            --shadow-sm: 0 2px 4px rgba(0,0,0,0.04);
            --shadow-md: 0 4px 12px rgba(0,0,0,0.06);
            --shadow-lg: 0 20px 40px rgba(0,0,0,0.1);
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: var(--bg-dark);
            color: var(--text-primary);
            display: flex;
            min-height: 100vh;
            margin: 0;
        }

        /* ── SIDEBAR ── */
        .tasks-sidebar {
            width: 240px;
            background: #1E1B4B;
            min-height: 100vh;
            position: fixed;
            top: 0;
            left: 0;
            display: flex;
            flex-direction: column;
            z-index: 200;
            overflow-y: auto;
        }

        .sb-logo {
            padding: 24px 20px 20px;
            display: flex;
            align-items: center;
            gap: 10px;
            text-decoration: none;
            border-bottom: 1px solid rgba(255,255,255,0.06);
            margin-bottom: 8px;
            flex-shrink: 0;
        }

        .sb-logo-icon {
            width: 36px;
            height: 36px;
            background: #7C3AED;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 1rem;
            flex-shrink: 0;
        }

        .sb-logo span {
            font-size: 1.15rem;
            font-weight: 800;
            color: white;
        }

        .sb-nav {
            padding: 4px 12px;
            display: flex;
            flex-direction: column;
            gap: 2px;
            flex: 1;
        }

        .sb-link {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 12px;
            border-radius: 10px;
            text-decoration: none;
            color: #C4B5FD;
            font-size: 0.88rem;
            font-weight: 600;
            transition: background 0.15s;
        }

        .sb-link:hover {
            background: rgba(124, 58, 237, 0.15);
            color: white;
        }

        .sb-link.active {
            background: #7C3AED;
            color: white;
        }

        .sb-link i {
            width: 18px;
            font-size: 0.9rem;
        }

        .sb-footer {
            padding: 12px;
            border-top: 1px solid rgba(255,255,255,0.06);
            flex-shrink: 0;
        }

        .sb-user {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 12px;
        }

        .sb-avatar {
            width: 34px;
            height: 34px;
            border-radius: 50%;
            background: #7C3AED;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 700;
            font-size: 0.85rem;
            flex-shrink: 0;
        }

        .sb-username {
            font-size: 0.85rem;
            font-weight: 700;
            color: white;
        }

        .sb-role {
            font-size: 0.72rem;
            color: #C4B5FD;
        }

        .sb-logout {
            width: 100%;
            margin-top: 8px;
            padding: 9px 12px;
            background: #DC2626;
            color: white;
            border: none;
            border-radius: 8px;
            font-family: 'Plus Jakarta Sans', sans-serif;
            font-weight: 600;
            font-size: 0.82rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            justify-content: center;
            transition: background 0.2s;
        }

        .sb-logout:hover {
            background: #B91C1C;
        }

        /* ── MAIN CONTENT ── */
        .tasks-main {
            margin-left: 240px;
            padding: 2rem;
            min-height: 100vh;
            flex: 1;
            max-width: calc(100vw - 240px);
        }

        .tasks-header {
            margin-bottom: 28px;
        }

        .tasks-header h1 {
            font-size: 1.75rem;
            font-weight: 800;
            color: var(--text-primary);
            margin: 0 0 4px;
        }

        .tasks-header p {
            font-size: 0.9rem;
            color: var(--text-secondary);
            margin: 0;
        }

        /* ── STATS BAR ── */
        .todo-stats-bar {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: var(--spacing-md);
            margin-bottom: var(--spacing-xl);
        }

        .todo-stat-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: var(--border-radius-lg);
            padding: var(--spacing-md) var(--spacing-lg);
            display: flex;
            align-items: center;
            gap: var(--spacing-md);
            box-shadow: var(--shadow-md);
        }

        .todo-stat-icon {
            width: 48px;
            height: 48px;
            border-radius: var(--border-radius-md);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.35rem;
        }

        .todo-stat-card.pending .todo-stat-icon { background: rgba(99, 102, 241, 0.1); color: #6366F1; }
        .todo-stat-card.completed .todo-stat-icon { background: rgba(22, 163, 74, 0.1); color: var(--success-color); }
        .todo-stat-card.due-today .todo-stat-icon { background: rgba(245, 158, 11, 0.1); color: #F59E0B; }
        .todo-stat-card.overdue .todo-stat-icon { background: rgba(239, 68, 68, 0.1); color: var(--error-color); }

        .todo-stat-info {
            display: flex;
            flex-direction: column;
        }

        .todo-stat-value {
            font-size: var(--font-size-xl);
            font-weight: 700;
            color: var(--text-primary);
            line-height: 1.2;
        }

        .todo-stat-label {
            font-size: var(--font-size-sm);
            color: var(--text-secondary);
        }

        /* ── FILTERS ── */
        .todo-filters-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: var(--spacing-md);
            margin-bottom: var(--spacing-lg);
        }

        .filter-btn-group {
            display: flex;
            gap: var(--spacing-sm);
            flex-wrap: wrap;
        }

        .filter-btn {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            color: var(--text-secondary);
            padding: 6px 14px;
            border-radius: var(--border-radius-pill);
            font-size: var(--font-size-sm);
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .filter-btn:hover {
            border-color: var(--accent-glow);
            color: var(--accent-glow);
        }

        .filter-btn.active {
            background: var(--accent-glow);
            border-color: var(--accent-glow);
            color: white;
        }

        /* ── BUTTONS ── */
        .btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 20px;
            border: none;
            border-radius: var(--border-radius-lg);
            font-family: 'Plus Jakarta Sans', sans-serif;
            font-size: var(--font-size-sm);
            font-weight: 700;
            cursor: pointer;
            transition: all var(--transition-normal);
        }

        .btn-primary {
            background: var(--accent-glow);
            color: white;
        }

        .btn-primary:hover {
            background: #5B21B6;
        }

        .btn-secondary {
            background: var(--bg-dark);
            color: var(--text-primary);
            border: 1px solid var(--border-color);
        }

        .btn-secondary:hover {
            background: #E5E7EB;
        }

        /* ── TODO LIST ── */
        .todo-list-container {
            display: flex;
            flex-direction: column;
            gap: var(--spacing-md);
        }

        .todo-item {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: var(--border-radius-lg);
            padding: var(--spacing-md) var(--spacing-lg);
            display: flex;
            align-items: center;
            gap: var(--spacing-md);
            box-shadow: var(--shadow-md);
            transition: all var(--transition-normal);
        }

        .todo-item.pinned {
            border-color: var(--accent-glow);
            background: rgba(124, 58, 237, 0.01);
            box-shadow: 0 0 10px rgba(124, 58, 237, 0.05), var(--shadow-md);
        }

        .todo-item.completed {
            opacity: 0.65;
        }

        .todo-checkbox-btn {
            background: none;
            border: none;
            font-size: 1.35rem;
            cursor: pointer;
            color: var(--text-secondary);
            padding: 0;
            display: flex;
            align-items: center;
        }

        .todo-item.completed .todo-checkbox-btn {
            color: var(--success-color);
        }

        .todo-details {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .todo-header-row {
            display: flex;
            align-items: center;
            gap: var(--spacing-md);
            flex-wrap: wrap;
        }

        .todo-title {
            font-weight: 600;
            color: var(--text-primary);
            font-size: var(--font-size-base);
        }

        .todo-item.completed .todo-title {
            text-decoration: line-through;
            color: var(--text-secondary);
        }

        .todo-desc {
            font-size: var(--font-size-sm);
            color: var(--text-secondary);
            margin: 0;
        }

        .todo-meta-row {
            display: flex;
            align-items: center;
            gap: var(--spacing-md);
            flex-wrap: wrap;
            margin-top: 4px;
        }

        .priority-badge {
            font-size: 0.75rem;
            font-weight: 600;
            padding: 2px 8px;
            border-radius: var(--border-radius-pill);
            text-transform: capitalize;
        }

        .priority-badge.badge-urgent { background: #FEE2E2; color: #EF4444; }
        .priority-badge.badge-high { background: #FFEDD5; color: #F59E0B; }
        .priority-badge.badge-medium { background: #E0E7FF; color: #6366F1; }
        .priority-badge.badge-low { background: #DCFCE7; color: #16A34A; }

        .due-badge {
            font-size: 0.75rem;
            font-weight: 500;
            color: var(--text-secondary);
            display: inline-flex;
            align-items: center;
            gap: 4px;
        }

        .due-badge.overdue {
            color: var(--error-color);
            font-weight: 600;
        }

        .xp-badge {
            font-size: 0.75rem;
            font-weight: 600;
            background: rgba(245, 158, 11, 0.1);
            color: #F59E0B;
            padding: 2px 8px;
            border-radius: var(--border-radius-pill);
        }

        .todo-tags-list {
            display: flex;
            gap: 4px;
            flex-wrap: wrap;
        }

        .todo-tag {
            font-size: 0.75rem;
            color: var(--accent-glow);
            font-weight: 500;
        }

        .todo-actions {
            display: flex;
            gap: var(--spacing-sm);
        }

        .action-btn {
            background: none;
            border: none;
            font-size: 1rem;
            cursor: pointer;
            color: var(--text-placeholder);
            padding: 6px;
            border-radius: var(--border-radius-md);
            transition: all 0.2s ease;
        }

        .action-btn:hover {
            color: var(--text-primary);
            background: var(--bg-dark);
        }

        .action-btn.pin-btn.active {
            color: var(--accent-glow);
        }

        .action-btn.delete-btn:hover {
            color: var(--error-color);
        }

        /* ── EMPTY STATE ── */
        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: var(--spacing-2xl) var(--spacing-xl);
            color: var(--text-secondary);
            text-align: center;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: var(--border-radius-lg);
            box-shadow: var(--shadow-md);
            margin: var(--spacing-md) 0;
        }

        .empty-state i {
            font-size: 3rem;
            color: var(--text-placeholder);
            margin-bottom: var(--spacing-md);
        }

        .empty-state p {
            font-size: var(--font-size-base);
            font-weight: 500;
            margin: 0;
        }

        /* ── MODAL ── */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(30, 27, 46, 0.4);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            z-index: 2000;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.25s ease;
        }

        .modal.active {
            opacity: 1;
            pointer-events: auto;
        }

        .modal-content {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: var(--border-radius-lg);
            width: 90%;
            max-width: 500px;
            box-shadow: var(--shadow-lg);
            transform: translateY(20px);
            transition: transform 0.25s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .modal.active .modal-content {
            transform: translateY(0);
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: var(--spacing-lg);
            border-bottom: 1px solid var(--border-color);
        }

        .modal-header h3 {
            font-size: var(--font-size-lg);
            font-weight: 700;
            color: var(--text-primary);
            margin: 0;
        }

        .modal-close {
            background: none;
            border: none;
            font-size: 1.25rem;
            cursor: pointer;
            color: var(--text-secondary);
            transition: color var(--transition-fast);
        }

        .modal-close:hover {
            color: var(--text-primary);
        }

        .modal-body {
            padding: var(--spacing-lg);
            max-height: 70vh;
            overflow-y: auto;
        }

        .modal-footer {
            display: flex;
            justify-content: flex-end;
            gap: var(--spacing-md);
            padding: var(--spacing-lg);
            border-top: 1px solid var(--border-color);
            background: var(--bg-dark);
        }

        /* ── FORM ── */
        .form-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
            margin-bottom: var(--spacing-md);
        }

        .form-group label {
            font-size: var(--font-size-sm);
            font-weight: 600;
            color: var(--text-primary);
        }

        .form-group input,
        .form-group textarea,
        .form-group select {
            padding: 10px 12px;
            border: 1px solid var(--border-color);
            border-radius: var(--border-radius-md);
            font-family: 'Plus Jakarta Sans', sans-serif;
            font-size: var(--font-size-sm);
            color: var(--text-primary);
            outline: none;
            transition: border-color var(--transition-fast);
            background: var(--bg-card);
        }

        .form-group input:focus,
        .form-group textarea:focus,
        .form-group select:focus {
            border-color: var(--accent-glow);
        }

        /* ── TOAST ── */
        .toast {
            position: fixed;
            bottom: var(--spacing-xl);
            right: var(--spacing-xl);
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: var(--border-radius-lg);
            box-shadow: var(--shadow-lg);
            padding: var(--spacing-md) var(--spacing-lg);
            z-index: 9999;
            display: flex;
            align-items: center;
            gap: var(--spacing-sm);
            transform: translateY(100px);
            opacity: 0;
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275), opacity 0.3s ease;
            pointer-events: none;
        }

        .toast.show {
            transform: translateY(0);
            opacity: 1;
        }

        .toast.success { border-left: 4px solid var(--success-color); }
        .toast.error { border-left: 4px solid var(--error-color); }
        .toast.info { border-left: 4px solid var(--accent-glow); }

        /* ── RESPONSIVE ── */
        @media (max-width: 768px) {
            .todo-stats-bar {
                grid-template-columns: repeat(2, 1fr);
            }

            .tasks-main {
                margin-left: 0;
                padding: 1rem;
                max-width: 100%;
            }

            .tasks-sidebar {
                display: none;
            }

            .todo-filters-row {
                flex-direction: column;
                align-items: stretch;
            }

            .filter-btn-group {
                overflow-x: auto;
                flex-wrap: nowrap;
                padding-bottom: 4px;
            }
        }
    </style>
</head>
<body>

    <!-- SIDEBAR -->
    <aside class="tasks-sidebar">
        <a href="home.html" class="sb-logo">
            <div class="sb-logo-icon"><i class="fas fa-graduation-cap"></i></div>
            <span>StudyFlow</span>
        </a>
        <nav class="sb-nav">
            <a href="home.html" class="sb-link"><i class="fas fa-home"></i> Home</a>
            <a href="hub.html" class="sb-link"><i class="fas fa-th-large"></i> Hub</a>
            <a href="notes.html" class="sb-link"><i class="fas fa-sticky-note"></i> Notes</a>
            <a href="progress.html" class="sb-link"><i class="fas fa-chart-line"></i> Progress</a>
            <a href="tasks.html" class="sb-link active"><i class="fas fa-calendar-alt"></i> Task Scheduler</a>
            <a href="profile.html" class="sb-link"><i class="fas fa-user"></i> Profile</a>
        </nav>
        <div class="sb-footer">
            <div class="sb-user">
                <div class="sb-avatar" id="sb-avatar">?</div>
                <div>
                    <div class="sb-username" id="sb-name">...</div>
                    <div class="sb-role">Student</div>
                </div>
            </div>
            <button class="sb-logout" onclick="logoutUser()">
                <i class="fas fa-sign-out-alt"></i> Logout
            </button>
        </div>
    </aside>

    <!-- MAIN CONTENT -->
    <main class="tasks-main">

        <!-- Header -->
        <div class="tasks-header">
            <h1>📋 Task Scheduler</h1>
            <p>Manage your daily tasks and stay organized.</p>
        </div>

        <!-- Stats Bar -->
        <div class="todo-stats-bar">
            <div class="todo-stat-card pending">
                <div class="todo-stat-icon"><i class="fas fa-clock"></i></div>
                <div class="todo-stat-info">
                    <span class="todo-stat-value" id="todo-stat-pending">0</span>
                    <span class="todo-stat-label">Pending</span>
                </div>
            </div>
            <div class="todo-stat-card completed">
                <div class="todo-stat-icon"><i class="fas fa-check-circle"></i></div>
                <div class="todo-stat-info">
                    <span class="todo-stat-value" id="todo-stat-completed">0</span>
                    <span class="todo-stat-label">Completed</span>
                </div>
            </div>
            <div class="todo-stat-card due-today">
                <div class="todo-stat-icon"><i class="fas fa-calendar-day"></i></div>
                <div class="todo-stat-info">
                    <span class="todo-stat-value" id="todo-stat-today">0</span>
                    <span class="todo-stat-label">Due Today</span>
                </div>
            </div>
            <div class="todo-stat-card overdue">
                <div class="todo-stat-icon"><i class="fas fa-exclamation-triangle"></i></div>
                <div class="todo-stat-info">
                    <span class="todo-stat-value" id="todo-stat-overdue">0</span>
                    <span class="todo-stat-label">Overdue</span>
                </div>
            </div>
        </div>

        <!-- Filters Row -->
        <div class="todo-filters-row">
            <div class="filter-btn-group">
                <button class="filter-btn active" data-filter="all">All</button>
                <button class="filter-btn" data-filter="todo">To Do</button>
                <button class="filter-btn" data-filter="done">Done</button>
                <button class="filter-btn" data-filter="urgent">Urgent</button>
                <button class="filter-btn" data-filter="today">Due Today</button>
            </div>
            <button class="btn btn-primary" onclick="openCreateTodoModal()">
                <i class="fas fa-plus"></i> New Task
            </button>
        </div>

        <!-- Todos List -->
        <div class="todo-list-container" id="todos-list-container">
            <!-- Dynamically loaded -->
        </div>

    </main>

    <!-- TODO CREATE/EDIT MODAL -->
    <div id="todo-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="todo-modal-title">New Task</h3>
                <button class="modal-close" onclick="closeModal('todo-modal')">&times;</button>
            </div>
            <div class="modal-body">
                <form id="todo-form" onsubmit="saveTodo(event)">
                    <input type="hidden" id="todo-form-id">
                    <div class="form-group">
                        <label for="todo-title">Task Title *</label>
                        <input type="text" id="todo-title" required placeholder="e.g. Solve physics problems">
                    </div>
                    <div class="form-group">
                        <label for="todo-description">Description</label>
                        <textarea id="todo-description" rows="3" placeholder="Optional details..."></textarea>
                    </div>
                    <div class="form-group">
                        <label for="todo-priority">Priority</label>
                        <select id="todo-priority">
                            <option value="low">Low</option>
                            <option value="medium" selected>Medium</option>
                            <option value="high">High</option>
                            <option value="urgent">Urgent</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="todo-due-date">Due Date</label>
                        <input type="date" id="todo-due-date">
                    </div>
                    <div class="form-group">
                        <label for="todo-tags">Tags (comma-separated)</label>
                        <input type="text" id="todo-tags" placeholder="e.g. homework, physics">
                    </div>
                    <div class="form-group">
                        <label for="todo-xp">XP Reward</label>
                        <input type="number" id="todo-xp" value="10" min="1">
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="closeModal('todo-modal')">Cancel</button>
                <button class="btn btn-primary" type="submit" form="todo-form">Save Task</button>
            </div>
        </div>
    </div>

    <!-- Toast -->
    <div id="toast" class="toast"></div>

    <script>
        // ──────────────────────────────────────────────────────────────
        // 📌 NOTE: This page uses REAL API calls from the StudyFlow backend.
        // If the 'todos' table doesn't exist yet, the page gracefully 
        // shows empty states with encouraging messages.
        // 
        // To enable full functionality, run:
        // docker-compose exec db psql -U user -d studyflow -f /app/schema_v2_features.sql
        // ──────────────────────────────────────────────────────────────

        // ============================================================
        // API CONFIGURATION
        // ============================================================

        const API_BASE = 'http://localhost:8000';

        function getToken() {
            return localStorage.getItem('studyflowToken') || localStorage.getItem('studyflow_token');
        }

        function getHeaders() {
            const token = getToken();
            if (!token) {
                window.location.href = 'auth.html';
                return {};
            }
            return {
                'Content-Type': 'application/json',
                'Authorization': `Bearer ${token}`
            };
        }

        function logoutUser() {
            localStorage.removeItem('studyflowToken');
            localStorage.removeItem('studyflow_token');
            localStorage.removeItem('username');
            localStorage.removeItem('sf_onboarding');
            window.location.href = 'auth.html';
        }

        async function apiRequest(endpoint, options = {}) {
            const url = `${API_BASE}${endpoint}`;
            options.headers = {
                ...getHeaders(),
                ...options.headers
            };

            try {
                const response = await fetch(url, options);
                if (response.status === 401) {
                    localStorage.removeItem('studyflowToken');
                    localStorage.removeItem('studyflow_token');
                    window.location.href = 'auth.html';
                    return null;
                }
                if (response.status === 204) return true;
                if (!response.ok) {
                    console.warn(`API error (${response.status}) for ${endpoint}: Tables may not exist yet.`);
                    return null;
                }
                return await response.json();
            } catch (err) {
                console.warn(`Request to ${endpoint} failed:`, err.message);
                return null;
            }
        }

        // ============================================================
        // UTILITY FUNCTIONS
        // ============================================================

        function escapeHTML(str) {
            if (!str) return '';
            return String(str).replace(/[&<>'"]/g,
                tag => ({
                    '&': '&amp;',
                    '<': '&lt;',
                    '>': '&gt;',
                    "'": '&#39;',
                    '"': '&quot;'
                }[tag] || tag)
            );
        }

        function showToast(message, type = 'success') {
            const toast = document.getElementById('toast');
            if (!toast) return;

            toast.className = 'toast show ' + type;

            let icon = '<i class="fas fa-check-circle" style="color: var(--success-color);"></i>';
            if (type === 'error') {
                icon = '<i class="fas fa-exclamation-circle" style="color: var(--error-color);"></i>';
            } else if (type === 'info') {
                icon = '<i class="fas fa-info-circle" style="color: var(--accent-glow);"></i>';
            }

            toast.innerHTML = `${icon} <span style="font-weight:600;">${escapeHTML(message)}</span>`;

            if (window.toastTimeout) clearTimeout(window.toastTimeout);
            window.toastTimeout = setTimeout(() => {
                toast.classList.remove('show');
            }, 4000);
        }

        function openModal(id) {
            document.getElementById(id).classList.add('active');
        }

        function closeModal(id) {
            document.getElementById(id).classList.remove('active');
        }

        document.querySelectorAll('.modal').forEach(m => {
            m.addEventListener('click', (e) => {
                if (e.target === m) closeModal(m.id);
            });
        });

        function formatRelativeDate(dateStr) {
            if (!dateStr) return '';
            const date = new Date(dateStr);
            const now = new Date();
            const diffMs = now - date;
            const diffSec = Math.floor(diffMs / 1000);
            const diffMin = Math.floor(diffSec / 60);
            const diffHr = Math.floor(diffMin / 60);
            const diffDays = Math.floor(diffHr / 24);

            if (diffSec < 60) return 'Just now';
            if (diffMin < 60) return `${diffMin}m ago`;
            if (diffHr < 24) return `${diffHr}h ago`;
            if (diffDays === 1) return 'Yesterday';
            if (diffDays < 7) return `${diffDays}d ago`;
            return date.toLocaleDateString();
        }

        // ============================================================
        // MODULE: TODOS (TASKS)
        // ============================================================

        let allTodos = [];
        let currentTodoFilter = 'all';

        async function loadTodos() {
            try {
                const [todos, stats] = await Promise.all([
                    apiRequest('/todos'),
                    apiRequest('/todos/stats')
                ]);

                allTodos = todos || [];
                updateTodoStatsUI(stats);
                renderTodoList();
            } catch (err) {
                console.error("Failed to load todos", err);
            }
        }

        function updateTodoStatsUI(stats) {
            if (!stats) return;
            document.getElementById('todo-stat-pending').textContent = stats.pending || 0;
            document.getElementById('todo-stat-completed').textContent = stats.completed || 0;
            document.getElementById('todo-stat-today').textContent = stats.due_today || 0;
            document.getElementById('todo-stat-overdue').textContent = stats.overdue || 0;
        }

        // Filter handlers
        document.querySelectorAll('.filter-btn-group .filter-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.filter-btn-group .filter-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentTodoFilter = btn.getAttribute('data-filter');
                renderTodoList();
            });
        });

        function renderTodoList() {
            const container = document.getElementById('todos-list-container');
            container.innerHTML = '';

            const todayStr = new Date().toISOString().split('T')[0];

            const filtered = allTodos.filter(todo => {
                if (currentTodoFilter === 'all') return true;
                if (currentTodoFilter === 'todo') return todo.status !== 'done';
                if (currentTodoFilter === 'done') return todo.status === 'done';
                if (currentTodoFilter === 'urgent') return todo.priority === 'urgent';
                if (currentTodoFilter === 'today') return todo.due_date === todayStr && todo.status !== 'done';
                return true;
            });

            if (filtered.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-tasks"></i>
                        <p>No tasks found. Click "New Task" to add your first one!</p>
                    </div>
                `;
                return;
            }

            filtered.forEach(todo => {
                const isCompleted = todo.status === 'done';
                const isPinned = todo.is_pinned;

                let isOverdue = false;
                if (todo.due_date && todo.status !== 'done') {
                    const today = new Date();
                    today.setHours(0, 0, 0, 0);
                    const due = new Date(todo.due_date);
                    due.setHours(0, 0, 0, 0);
                    isOverdue = due < today;
                }

                let priorityClass = 'badge-medium';
                if (todo.priority === 'urgent') priorityClass = 'badge-urgent';
                else if (todo.priority === 'high') priorityClass = 'badge-high';
                else if (todo.priority === 'low') priorityClass = 'badge-low';

                const tagsHTML = (todo.tags || []).map(t => `<span class="todo-tag">#${escapeHTML(t)}</span>`).join(' ');

                const itemHTML = `
                    <div class="todo-item ${isCompleted ? 'completed' : ''} ${isPinned ? 'pinned' : ''}" data-id="${todo.id}">
                        <button class="todo-checkbox-btn" onclick="toggleTodoStatus(${todo.id}, '${todo.status}')" title="Mark as ${isCompleted ? 'Pending' : 'Done'}">
                            <i class="${isCompleted ? 'fas fa-check-circle' : 'far fa-circle'}"></i>
                        </button>
                        <div class="todo-details">
                            <div class="todo-header-row">
                                <span class="todo-title">${escapeHTML(todo.title)}</span>
                                <span class="priority-badge ${priorityClass}">${escapeHTML(todo.priority)}</span>
                            </div>
                            ${todo.description ? `<p class="todo-desc">${escapeHTML(todo.description)}</p>` : ''}
                            <div class="todo-meta-row">
                                ${todo.due_date ? `
                                    <span class="due-badge ${isOverdue ? 'overdue' : ''}">
                                        <i class="${isOverdue ? 'fas fa-exclamation-triangle' : 'far fa-calendar'}"></i>
                                        Due ${todo.due_date}
                                    </span>` : ''}
                                <span class="xp-badge">+${todo.xp_reward} XP</span>
                                <div class="todo-tags-list">${tagsHTML}</div>
                            </div>
                        </div>
                        <div class="todo-actions">
                            <button class="action-btn pin-btn ${isPinned ? 'active' : ''}" onclick="toggleTodoPin(${todo.id}, ${isPinned})" title="${isPinned ? 'Unpin task' : 'Pin task'}">
                                <i class="fas fa-thumbtack"></i>
                            </button>
                            <button class="action-btn delete-btn" onclick="deleteTodoTrigger(${todo.id})" title="Delete task">
                                <i class="fas fa-trash"></i>
                            </button>
                        </div>
                    </div>
                `;
                container.insertAdjacentHTML('beforeend', itemHTML);
            });
        }

        function openCreateTodoModal() {
            document.getElementById('todo-form').reset();
            document.getElementById('todo-form-id').value = '';
            document.getElementById('todo-modal-title').textContent = 'New Task';
            openModal('todo-modal');
        }

        async function saveTodo(event) {
            event.preventDefault();
            const id = document.getElementById('todo-form-id').value;
            const title = document.getElementById('todo-title').value;
            const description = document.getElementById('todo-description').value;
            const priority = document.getElementById('todo-priority').value;
            const due_date = document.getElementById('todo-due-date').value || null;
            const tagsRaw = document.getElementById('todo-tags').value;
            const xp_reward = parseInt(document.getElementById('todo-xp').value) || 10;

            const tags = tagsRaw ? tagsRaw.split(',').map(t => t.trim()).filter(t => t.length > 0) : [];

            const payload = { title, description, priority, due_date, tags, xp_reward };

            try {
                if (id) {
                    await apiRequest(`/todos/${id}`, {
                        method: 'PATCH',
                        body: JSON.stringify(payload)
                    });
                    showToast('Task updated successfully.');
                } else {
                    await apiRequest('/todos', {
                        method: 'POST',
                        body: JSON.stringify(payload)
                    });
                    showToast('Task created successfully.');
                }
                closeModal('todo-modal');
                loadTodos();
            } catch (err) {
                console.error("Failed to save todo", err);
            }
        }

        async function toggleTodoStatus(id, currentStatus) {
            const newStatus = currentStatus === 'done' ? 'todo' : 'done';
            try {
                const updated = await apiRequest(`/todos/${id}`, {
                    method: 'PATCH',
                    body: JSON.stringify({ status: newStatus })
                });

                if (newStatus === 'done') {
                    showToast(`Task completed! +${updated.xp_reward || 10} XP earned! 🚀`, 'success');
                } else {
                    showToast('Task marked as active.');
                }
                loadTodos();
            } catch (err) {
                console.error("Failed to toggle todo status", err);
            }
        }

        async function toggleTodoPin(id, isCurrentlyPinned) {
            try {
                await apiRequest(`/todos/${id}`, {
                    method: 'PATCH',
                    body: JSON.stringify({ is_pinned: !isCurrentlyPinned })
                });
                showToast(isCurrentlyPinned ? 'Task unpinned.' : 'Task pinned to top.');
                loadTodos();
            } catch (err) {
                console.error("Failed to pin/unpin todo", err);
            }
        }

        async function deleteTodoTrigger(id) {
            if (!confirm('Are you sure you want to delete this task?')) return;
            try {
                await apiRequest(`/todos/${id}`, { method: 'DELETE' });
                showToast('Task deleted.');
                loadTodos();
            } catch (err) {
                console.error("Failed to delete todo", err);
            }
        }

        // ============================================================
        // INITIALIZATION
        // ============================================================

        document.addEventListener('DOMContentLoaded', () => {
            const token = getToken();
            if (!token) {
                window.location.href = 'auth.html';
                return;
            }

            // Populate sidebar user info
            const username = localStorage.getItem('username') || '?';
            document.getElementById('sb-avatar').textContent = username[0].toUpperCase();
            document.getElementById('sb-name').textContent = username;

            // Load todos
            loadTodos();
        });
    </script>
</body>
</html>
