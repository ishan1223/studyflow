<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile - StudyFlow</title>
    <meta name="description" content="View and manage your StudyFlow profile, stats, and achievements.">
    <link rel="stylesheet" href="css/app.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.1.1/css/all.min.css">
    <link rel="apple-touch-icon" sizes="180x180" href="./favicon_io/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon_io/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon_io/favicon-16x16.png">
    <link rel="manifest" href="/favicon_io/site.webmanifest">
    <link rel="shortcut icon" href="/favicon_io/favicon.ico">
    <meta name="theme-color" content="#ffffff">
    <style>
        * { font-family: 'Plus Jakarta Sans', sans-serif !important; box-sizing: border-box; }
        i.fas, i.far, i.fa { font-family: "Font Awesome 6 Free" !important; font-weight: 900 !important; }
        i.fab { font-family: "Font Awesome 6 Brands" !important; }

        body {
            margin: 0; padding: 0;
            background: #F8F7FE;
            min-height: 100vh;
            display: flex;
        }

        /* ── Sidebar ── */
        .profile-sidebar {
            width: 240px;
            background: #1E1B4B;
            min-height: 100vh;
            position: fixed;
            top: 0; left: 0;
            display: flex;
            flex-direction: column;
            z-index: 200;
            overflow-y: auto;
        }
        .sb-logo {
            padding: 24px 20px 20px;
            display: flex; align-items: center; gap: 10px;
            text-decoration: none;
            border-bottom: 1px solid rgba(255,255,255,0.06);
            margin-bottom: 8px;
            flex-shrink: 0;
        }
        .sb-logo-icon {
            width: 36px; height: 36px;
            background: #7C3AED;
            border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            color: white; font-size: 1rem; flex-shrink: 0;
        }
        .sb-logo span { font-size: 1.15rem; font-weight: 800; color: white; }
        .sb-nav { padding: 4px 12px; display: flex; flex-direction: column; gap: 2px; flex: 1; }
        .sb-link {
            display: flex; align-items: center; gap: 12px;
            padding: 10px 12px; border-radius: 10px;
            text-decoration: none; color: #C4B5FD;
            font-size: 0.88rem; font-weight: 600;
            transition: background 0.15s;
        }
        .sb-link:hover { background: rgba(124,58,237,0.15); color: white; }
        .sb-link.active { background: #7C3AED; color: white; }
        .sb-link i { width: 16px; }
        .sb-footer {
            padding: 12px;
            border-top: 1px solid rgba(255,255,255,0.06);
            flex-shrink: 0;
        }
        .sb-user {
            display: flex; align-items: center; gap: 10px;
            padding: 10px 12px;
        }
        .sb-avatar {
            width: 34px; height: 34px;
            border-radius: 50%;
            background: #7C3AED;
            display: flex; align-items: center; justify-content: center;
            color: white; font-weight: 700; font-size: 0.85rem;
        }
        .sb-username { font-size: 0.85rem; font-weight: 700; color: white; }
        .sb-role { font-size: 0.72rem; color: #C4B5FD; }
        .sb-logout {
            width: 100%; margin-top: 8px;
            padding: 9px 12px;
            background: #DC2626; color: white;
            border: none; border-radius: 8px;
            font-family: 'Plus Jakarta Sans', sans-serif;
            font-weight: 600; font-size: 0.82rem;
            cursor: pointer;
            display: flex; align-items: center; gap: 8px; justify-content: center;
        }

        /* ── Main Content ── */
        .profile-main {
            margin-left: 240px;
            padding: 32px 32px 48px;
            flex: 1;
            max-width: calc(100vw - 240px);
        }

        .profile-page-header {
            margin-bottom: 28px;
        }
        .profile-page-header h1 {
            font-size: 1.75rem; font-weight: 800;
            color: #1E1B4B; margin: 0 0 4px;
        }
        .profile-page-header p {
            font-size: 0.9rem; color: #6B7280; margin: 0;
        }

        /* ── 2-col compact grid ── */
        .profile-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .profile-card {
            background: white;
            border: 1px solid #EDE9FE;
            border-radius: 16px;
            padding: 24px;
            box-shadow: 0 2px 12px rgba(124,58,237,0.04);
        }
        .profile-card.span-2 { grid-column: span 2; }

        .card-header {
            display: flex; align-items: center; gap: 10px;
            margin-bottom: 20px;
            padding-bottom: 14px;
            border-bottom: 1px solid #F3F4F6;
        }
        .card-header i {
            width: 36px; height: 36px;
            border-radius: 10px;
            background: rgba(124,58,237,0.1);
            color: #7C3AED;
            display: flex; align-items: center; justify-content: center;
            font-size: 1rem;
        }
        .card-header h2 {
            font-size: 1rem; font-weight: 700;
            color: #1E1B4B; margin: 0;
        }

        /* Avatar Section */
        .avatar-block {
            display: flex; align-items: center; gap: 20px;
            margin-bottom: 20px;
        }
        .big-avatar {
            width: 80px; height: 80px;
            border-radius: 50%;
            background: linear-gradient(135deg, #7C3AED, #6366F1);
            display: flex; align-items: center; justify-content: center;
            color: white; font-size: 2rem; font-weight: 800;
            flex-shrink: 0;
        }
        .avatar-info h3 {
            font-size: 1.2rem; font-weight: 800; color: #1E1B4B; margin: 0 0 4px;
        }
        .avatar-info p {
            font-size: 0.85rem; color: #6B7280; margin: 0 0 8px;
        }
        .xp-chip {
            display: inline-flex; align-items: center; gap: 6px;
            background: rgba(245,158,11,0.1);
            color: #D97706;
            padding: 4px 12px; border-radius: 20px;
            font-size: 0.8rem; font-weight: 700;
        }

        /* Detail rows */
        .detail-row {
            display: flex; justify-content: space-between; align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid #F9FAFB;
            font-size: 0.875rem;
        }
        .detail-row:last-child { border-bottom: none; padding-bottom: 0; }
        .detail-label { color: #6B7280; font-weight: 500; }
        .detail-val { color: #1E1B4B; font-weight: 600; }

        /* Stat chips */
        .stats-chips {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
        }
        .stat-chip {
            background: #F8F7FE;
            border: 1px solid #EDE9FE;
            border-radius: 12px;
            padding: 16px;
            text-align: center;
        }
        .stat-chip .val {
            font-size: 1.6rem; font-weight: 800;
            color: #7C3AED; line-height: 1.1;
        }
        .stat-chip .lbl {
            font-size: 0.75rem; color: #6B7280;
            font-weight: 500; margin-top: 4px;
        }

        /* Achievements */
        .achievements-wrap {
            display: flex; flex-wrap: wrap; gap: 8px;
        }
        .ach-badge {
            display: inline-flex; align-items: center; gap: 6px;
            background: rgba(124,58,237,0.08);
            color: #7C3AED;
            border: 1px solid rgba(124,58,237,0.15);
            border-radius: 20px;
            padding: 5px 14px;
            font-size: 0.78rem; font-weight: 700;
        }

        /* Edit form */
        .edit-form { display: flex; flex-direction: column; gap: 14px; }
        .edit-form label {
            font-size: 0.8rem; font-weight: 600;
            color: #374151; display: block; margin-bottom: 4px;
        }
        .edit-form input {
            width: 100%;
            padding: 9px 12px;
            border: 1px solid #D1D5DB;
            border-radius: 8px;
            font-family: inherit;
            font-size: 0.875rem;
            color: #111827;
            background: #F9FAFB;
            transition: border-color 0.2s;
        }
        .edit-form input:focus {
            outline: none;
            border-color: #7C3AED;
            background: white;
        }
        .save-btn {
            padding: 10px 24px;
            background: #7C3AED; color: white;
            border: none; border-radius: 8px;
            font-family: inherit;
            font-weight: 700; font-size: 0.875rem;
            cursor: pointer;
            display: inline-flex; align-items: center; gap: 8px;
            transition: background 0.2s;
            align-self: flex-start;
        }
        .save-btn:hover { background: #6D28D9; }
        .save-btn:disabled { opacity: 0.6; cursor: not-allowed; }

        /* Toast */
        #profile-toast {
            position: fixed; bottom: 24px; right: 24px;
            background: white;
            border: 1px solid #EDE9FE;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.08);
            padding: 14px 20px;
            z-index: 9999;
            display: flex; align-items: center; gap: 10px;
            transform: translateY(80px);
            opacity: 0;
            transition: transform 0.3s cubic-bezier(0.175,0.885,0.32,1.275), opacity 0.3s;
            pointer-events: none;
            font-size: 0.875rem; font-weight: 600; color: #1E1B4B;
        }
        #profile-toast.show { transform: translateY(0); opacity: 1; }

        @media (max-width: 900px) {
            .profile-main { margin-left: 0; padding: 20px 16px 40px; max-width: 100%; }
            .profile-sidebar { display: none; }
            .profile-grid { grid-template-columns: 1fr; }
            .profile-card.span-2 { grid-column: span 1; }
        }
    </style>
</head>
<body>

    <!-- Sidebar -->
    <aside class="profile-sidebar">
        <a href="home.html" class="sb-logo">
            <div class="sb-logo-icon"><i class="fas fa-graduation-cap"></i></div>
            <span>StudyFlow</span>
        </a>
        <div style="padding:4px 12px;display:flex;flex-direction:column;gap:2px;flex:1;">
            <a href="home.html" style="display:flex;align-items:center;gap:12px;padding:10px 12px;border-radius:10px;text-decoration:none;color:#C4B5FD;font-size:0.88rem;font-weight:600;"><i class="fas fa-home" style="width:18px;"></i> Home</a>
            <a href="hub.html" style="display:flex;align-items:center;gap:12px;padding:10px 12px;border-radius:10px;text-decoration:none;color:#C4B5FD;font-size:0.88rem;font-weight:600;"><i class="fas fa-th-large" style="width:18px;"></i> Hub</a>
            <a href="notes.html" style="display:flex;align-items:center;gap:12px;padding:10px 12px;border-radius:10px;text-decoration:none;color:#C4B5FD;font-size:0.88rem;font-weight:600;"><i class="fas fa-sticky-note" style="width:18px;"></i> Notes</a>
            <a href="progress.html" style="display:flex;align-items:center;gap:12px;padding:10px 12px;border-radius:10px;text-decoration:none;color:#C4B5FD;font-size:0.88rem;font-weight:600;"><i class="fas fa-chart-line" style="width:18px;"></i> Progress</a>
            <a href="tasks.html" style="display:flex;align-items:center;gap:12px;padding:10px 12px;border-radius:10px;text-decoration:none;color:#C4B5FD;font-size:0.88rem;font-weight:600;"><i class="fas fa-calendar-alt" style="width:18px;"></i> Task Scheduler</a>
            <a href="profile.html" style="display:flex;align-items:center;gap:12px;padding:10px 12px;border-radius:10px;text-decoration:none;background:#7C3AED;color:white;font-size:0.88rem;font-weight:600;"><i class="fas fa-user" style="width:18px;"></i> Profile</a>
        </div>
        <div class="sb-footer">
            <div class="sb-user">
                <div class="sb-avatar" id="sb-avatar">?</div>
                <div>
                    <div class="sb-username" id="sb-name">...</div>
                    <div class="sb-role">Student</div>
                </div>
            </div>
            <button class="sb-logout" onclick="logout()">
                <i class="fas fa-sign-out-alt"></i> Logout
            </button>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="profile-main">
        <div class="profile-page-header">
            <h1>My Profile</h1>
            <p>Manage your account details and view your learning stats.</p>
        </div>

        <div class="profile-grid">

            <!-- Card 1: Avatar + Identity -->
            <div class="profile-card">
                <div class="card-header">
                    <i class="fas fa-id-badge"></i>
                    <h2>Account Overview</h2>
                </div>
                <div class="avatar-block">
                    <div class="big-avatar" id="profile-big-avatar">?</div>
                    <div class="avatar-info">
                        <h3 id="profile-display-name">Loading…</h3>
                        <p id="profile-email-text">—</p>
                        <div class="xp-chip">⭐ <span id="profile-xp">0</span> XP</div>
                    </div>
                </div>
                <div class="detail-row">
                    <span class="detail-label">Username</span>
                    <span class="detail-val" id="profile-username">—</span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">Email</span>
                    <span class="detail-val" id="profile-email">—</span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">Member since</span>
                    <span class="detail-val" id="profile-since">—</span>
                </div>
            </div>

            <!-- Card 4: Edit Profile -->
            <div class="profile-card">
                <div class="card-header">
                    <i class="fas fa-pencil-alt"></i>
                    <h2>Edit Profile</h2>
                </div>
                <form class="edit-form" onsubmit="saveProfile(event)">
                    <div>
                        <label for="edit-display-name">Display Name</label>
                        <input type="text" id="edit-display-name" placeholder="e.g. Alex">
                    </div>
                    <div>
                        <label for="edit-daily-mins">Daily Study Goal (minutes)</label>
                        <input type="number" id="edit-daily-mins" min="5" max="600" placeholder="e.g. 60">
                    </div>
                    <div>
                        <label for="edit-college">College / School</label>
                        <input type="text" id="edit-college" placeholder="e.g. IIT Delhi">
                    </div>
                    <div>
                        <label for="edit-branch">Branch / Stream</label>
                        <input type="text" id="edit-branch" placeholder="e.g. Computer Science">
                    </div>
                    <button class="save-btn" type="submit" id="save-profile-btn">
                        <i class="fas fa-save"></i> Save Changes
                    </button>
                </form>
            </div>

        </div>
    </main>

    <div id="profile-toast"></div>

    <script>
        const API_BASE = 'http://localhost:8000';

        function getToken() {
            return localStorage.getItem('studyflowToken') || localStorage.getItem('studyflow_token');
        }

        function getHeaders() {
            const token = getToken();
            if (!token) { window.location.href = 'auth.html'; return {}; }
            return {
                'Content-Type': 'application/json',
                'Authorization': `Bearer ${token}`
            };
        }

        function logout() {
            localStorage.removeItem('studyflowToken');
            localStorage.removeItem('studyflow_token');
            localStorage.removeItem('username');
            window.location.href = 'home.html';
        }

        async function apiRequest(endpoint, options = {}) {
            const url = `${API_BASE}${endpoint}`;
            options.headers = { ...getHeaders(), ...options.headers };
            try {
                const response = await fetch(url, options);
                if (response.status === 401) { logout(); return null; }
                if (response.status === 204) return true;
                if (!response.ok) {
                    const errData = await response.json().catch(() => ({}));
                    throw new Error(errData.detail || `API error: ${response.status}`);
                }
                return await response.json();
            } catch (err) {
                showToast(err.message || 'Request failed', 'error');
                throw err;
            }
        }

        function showToast(message, type = 'success') {
            const toast = document.getElementById('profile-toast');
            const icon = type === 'success'
                ? '<i class="fas fa-check-circle" style="color:#16A34A;"></i>'
                : '<i class="fas fa-exclamation-circle" style="color:#EF4444;"></i>';
            toast.innerHTML = `${icon} ${message}`;
            toast.classList.add('show');
            if (window._toastTimer) clearTimeout(window._toastTimer);
            window._toastTimer = setTimeout(() => toast.classList.remove('show'), 4000);
        }

        function formatDate(dateStr) {
            if (!dateStr) return '—';
            return new Date(dateStr).toLocaleDateString('en-US', { year: 'numeric', month: 'short', day: 'numeric' });
        }

        async function loadProfile() {
            try {
                const [userInfo, stats, achievements] = await Promise.all([
                    apiRequest('/users/me'),
                    apiRequest('/users/me/stats'),
                    apiRequest('/achievements')
                ]);

                if (!userInfo) return;

                // Sidebar
                const username = userInfo.username || localStorage.getItem('username') || '?';
                const initial = username[0].toUpperCase();
                document.getElementById('sb-avatar').textContent = initial;
                document.getElementById('sb-name').textContent = username;

                // Card 1: Identity
                const displayName = userInfo.display_name || userInfo.username || '—';
                document.getElementById('profile-big-avatar').textContent = displayName[0].toUpperCase();
                document.getElementById('profile-display-name').textContent = displayName;
                document.getElementById('profile-email-text').textContent = userInfo.email || '—';
                document.getElementById('profile-xp').textContent = (stats?.xp ?? userInfo.xp ?? 0).toLocaleString();
                document.getElementById('profile-username').textContent = userInfo.username || '—';
                document.getElementById('profile-email').textContent = userInfo.email || '—';
                document.getElementById('profile-since').textContent = formatDate(stats?.last_login_date);

                // Card 2: Stats
                document.getElementById('stat-streak').textContent = stats?.streak_count ?? 0;
                document.getElementById('stat-xp').textContent = (stats?.xp ?? 0).toLocaleString();
                document.getElementById('stat-last-login').textContent = stats?.last_login_date
                    ? new Date(stats.last_login_date).toLocaleDateString('en-US', { month: 'short', day: 'numeric' })
                    : '—';
                document.getElementById('stat-achievements').textContent = achievements?.length ?? 0;

                // Card 3: Achievements
                const achContainer = document.getElementById('achievements-list');
                if (!achievements || achievements.length === 0) {
                    achContainer.innerHTML = '<span style="color:#9CA3AF;font-size:0.85rem;">No achievements yet. Keep studying! 🚀</span>';
                } else {
                    achContainer.innerHTML = achievements.map(a =>
                        `<span class="ach-badge"><i class="${a.icon_class || 'fas fa-star'}"></i> ${a.name}</span>`
                    ).join('');
                }

                // Card 4: Prefill edit form
                document.getElementById('edit-display-name').value = userInfo.display_name || '';
                document.getElementById('edit-daily-mins').value = userInfo.daily_minutes || 60;
                document.getElementById('edit-college').value = userInfo.college_name || '';
                document.getElementById('edit-branch').value = userInfo.branch || '';

            } catch (err) {
                console.error('Failed to load profile', err);
            }
        }

        async function saveProfile(event) {
            event.preventDefault();
            const btn = document.getElementById('save-profile-btn');
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Saving…';

            const payload = {};
            const displayName = document.getElementById('edit-display-name').value.trim();
            const dailyMins = parseInt(document.getElementById('edit-daily-mins').value);
            const college = document.getElementById('edit-college').value.trim();
            const branch = document.getElementById('edit-branch').value.trim();

            if (displayName) payload.display_name = displayName;
            if (dailyMins) payload.daily_minutes = dailyMins;
            if (college) payload.college_name = college;
            if (branch) payload.branch = branch;

            try {
                const result = await apiRequest('/users/me', {
                    method: 'PUT',
                    body: JSON.stringify(payload)
                });
                if (result) {
                    showToast('Profile updated successfully! ✅');
                    loadProfile();
                }
            } catch (err) {
                console.error('Failed to save profile', err);
            } finally {
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-save"></i> Save Changes';
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            const token = getToken();
            if (!token) { window.location.href = 'auth.html'; return; }
            loadProfile();
        });
    </script>
</body>
</html>
